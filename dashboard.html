<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>控制台 | Kindleaf Storybook</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="返回 Kindleaf Storybook 首页">
      <span class="brand-mark">K</span>
      <span>
        <strong>Kindleaf Storybook</strong>
        <small>老师控制台</small>
      </span>
    </a>
    <div class="header-actions">
      <a class="secondary" href="index.html">返回首页</a>
      <a class="primary" href="index.html#demo">预约演示</a>
    </div>
  </header>

  <main class="console-page">
    <section class="console-hero">
      <p class="eyebrow">Teacher Console</p>
      <h1>控制台</h1>
      <p>这里作为首页进入老师端的落点，展示母本、孩子档案、定制绘本和导出交付的核心入口。</p>
    </section>

    <section class="console-grid" aria-label="控制台入口">
      <article class="feature-card feature-card-accent">
        <span class="card-index">01</span>
        <h3>母本库</h3>
        <p>选择普通绘本母本，快速派生孩子定制版本。</p>
      </article>
      <article class="feature-card">
        <span class="card-index">02</span>
        <h3>孩子档案</h3>
        <p>管理昵称、年龄、兴趣和最近挑战，减少重复填写。</p>
      </article>
      <article class="feature-card">
        <span class="card-index">03</span>
        <h3>绘本工作台</h3>
        <p>生成 6 页故事、老师寄语和家庭复述建议。</p>
      </article>
      <article class="feature-card">
        <span class="card-index">04</span>
        <h3>导出分享</h3>
        <p>确认隐私范围后，准备课堂打印版和家长沟通版。</p>
      </article>
    </section>
  </main>
</body>
</html>
