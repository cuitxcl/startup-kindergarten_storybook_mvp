logger:
  enable: false
  pretty_backtrace: true
  level: debug
  format: compact

server:
  binding: 127.0.0.1
  port: 8081
  host: http://127.0.0.1
  ident: kindleaf-server-test

database:
  uri: {{ get_env(name="DATABASE_URL", default="postgres://postgres:postgres@127.0.0.1:55432/kindleaf_test") }}
  enable_logging: false
  connect_timeout: 5000
  idle_timeout: 5000
  min_connections: 1
  max_connections: 2
  auto_migrate: false
  dangerously_truncate: false
  dangerously_recreate: false

workers:
  mode: BackgroundAsync

scheduler:
  jobs:
    requeue_generation_jobs:
      run: requeue_generation_jobs
      schedule: "every 5 minutes"
      run_on_start: false
      tags: [generation, recovery]
  output: stdout
