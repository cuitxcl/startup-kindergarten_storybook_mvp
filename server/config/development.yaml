logger:
  enable: true
  pretty_backtrace: true
  level: debug
  format: compact

server:
  binding: 127.0.0.1
  port: 8080
  host: http://127.0.0.1
  ident: kindleaf-server
  middlewares:
    cors:
      enable: true
    logger:
      enable: true
    catch_panic:
      enable: true

database:
  uri: {{ get_env(name="DATABASE_URL", default="postgres://postgres:postgres@127.0.0.1:55432/kindleaf_development") }}
  enable_logging: true
  connect_timeout: 5000
  idle_timeout: 5000
  min_connections: 1
  max_connections: 10
  auto_migrate: false
  dangerously_truncate: false
  dangerously_recreate: false

workers:
  mode: BackgroundAsync

scheduler:
  jobs:
    requeue_generation_jobs:
      run: requeue_generation_jobs
      schedule: "every 5 minutes"
      run_on_start: true
      tags: [generation, recovery]
  output: stdout
