logger:
  enable: true
  pretty_backtrace: false
  level: info
  format: json

server:
  binding: 0.0.0.0
  port: {{ get_env(name="PORT", default=8080) }}
  host: {{ get_env(name="APP_HOST", default="http://127.0.0.1") }}
  ident: kindleaf-server
  middlewares:
    cors:
      enable: true
    logger:
      enable: true
    catch_panic:
      enable: true

database:
  uri: {{ get_env(name="DATABASE_URL", default="postgres://postgres:postgres@localhost:5432/kindleaf_production") }}
  enable_logging: false
  connect_timeout: 5000
  idle_timeout: 5000
  min_connections: 1
  max_connections: 20
  auto_migrate: false
  dangerously_truncate: false
  dangerously_recreate: false

workers:
  mode: BackgroundAsync

scheduler:
  jobs:
    requeue_generation_jobs:
      run: requeue_generation_jobs
      schedule: "every 5 minutes"
      run_on_start: true
      tags: [generation, recovery]
  output: stdout
