[package]
name = "kindergarten-storybook-server"
version = "0.1.0"
edition = "2024"

[workspace]
members = [".", "migration"]

[dependencies]
loco-rs = { version = "0.16", default-features = false }
sea-orm = { version = "1", default-features = false, features = [
  "macros",
  "with-uuid",
  "with-json",
  "with-chrono",
  "with-rust_decimal",
  "sqlx-postgres",
] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rust_decimal = { version = "1", features = ["serde"] }
uuid = { version = "1", features = ["serde", "v4"] }
chrono = { version = "0.4", features = ["serde"] }

[dependencies.migration]
path = "migration"
